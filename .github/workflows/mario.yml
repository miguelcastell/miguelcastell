name: Generate Mario Contribution

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pillow requests

      - name: Run script
        run: python scripts/generate_mario.py

      - name: Commit and push GIF
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add output/mario.gif
          git commit -m "update mario gif" || echo "no changes"
          git push origin main
